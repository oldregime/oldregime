name: Update Profile SVG

on:
  schedule:
    # Runs every day at 00:30 UTC (06:00 IST)
    - cron: "30 0 * * *"
  workflow_dispatch:   # allow manual trigger
  push:
    branches: [main]
    paths:
      - "generate_svg.py"
      - "generate_links.py"

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile SVGs (dark + light)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_svg.py

      - name: Generate link bar SVGs (dark + light)
        run: python3 generate_links.py

      - name: Commit and push updated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg links_dark.svg links_light.svg
          git diff --cached --quiet || git commit -m "chore: auto-update SVGs [$(date -u '+%Y-%m-%d')]"
          git push
